name: Build-DockerfileBase-Release

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签 (如: py311-2026.Q2)'
        required: true
        default: 'py311-2026.Q2'
      platforms:
        description: '目标平台,多个用英文逗号分开 (linux/amd64,linux/arm64)'
        required: true
        default: 'linux/amd64,linux/arm64'
      release_tag:
        description: 'Release 标签名 (如: base-py311-2026.Q2)'
        required: true
        default: 'base-py311-2026.Q2'
permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (多架构支持)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export Docker images
        run: |
          IMAGE_NAME="galileo-icf-base-cpu"
          TAG="${{ github.event.inputs.image_tag }}"
          PLATFORMS="${{ github.event.inputs.platforms }}"

          IFS=',' read -r -a platform_array <<< "$PLATFORMS"
          for platform in "${platform_array[@]}"; do
            # linux/amd64 -> amd64, linux/arm64 -> arm64
            arch="${platform##*/}"
            echo "========== Building for ${platform} =========="
            docker buildx build \
              --platform "${platform}" \
              --file DockerfileBase \
              --tag "${IMAGE_NAME}:${TAG}" \
              --output "type=docker,dest=${IMAGE_NAME}-${TAG}-${arch}.tar" \
              .
            echo "========== Compressing ${arch} image =========="
            gzip -c "${IMAGE_NAME}-${TAG}-${arch}.tar" > "${IMAGE_NAME}-${TAG}-${arch}.tar.gz"
            rm -f "${IMAGE_NAME}-${TAG}-${arch}.tar"
          done

      - name: List generated files
        run: ls -lh *.tar.gz

      - name: Generate Release Body
        id: release_body
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          PLATFORMS="${{ github.event.inputs.platforms }}"
          {
            echo "body<<EOF"
            echo "## ICF Base Image Release"
            echo ""
            echo "- **Base image:** \`python:3.11-slim\`"
            echo "- **Full image:** \`galileo-icf-base-cpu:${TAG}\`"
            echo "- **Image tag:** \`${TAG}\`"
            echo "- **Platforms:** \`${PLATFORMS}\`"
            echo "- **Dockerfile:** \`DockerfileBase\`"
            echo ""
            echo "### 使用方式"
            echo "\`\`\`bash"
            echo "# 导入镜像"
            echo "gzip -d galileo-icf-base-cpu-${TAG}-amd64.tar.gz"
            echo "docker load -i galileo-icf-base-cpu-${TAG}-amd64.tar"
            echo "\`\`\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "Galileo ICF Base CPU ${{ github.event.inputs.release_tag }}"
          body: ${{ steps.release_body.outputs.body }}
          draft: false
          prerelease: false
          files: |
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
